protected-mode no
appendonly yes
save 900 1
save 300 10
save 60 10000
dir /data
dbfilename dump.rdb

# КРИТИЧЕСКИ ВАЖНО: Явно отключаем пароль (если был установлен ранее)
requirepass ""

# КРИТИЧЕСКИ ВАЖНО: Запрещаем репликацию, чтобы Redis всегда был master
# Запрещаем команду SLAVEOF внутри рантайма (нельзя использовать в конфиге)
rename-command SLAVEOF ""
rename-command REPLICAOF ""

# Примечание: replicaof нельзя указать в конфиге напрямую,
# но команды SLAVEOF/REPLICAOF запрещены, что предотвращает случайную настройку репликации

